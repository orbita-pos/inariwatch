name: InariWatch Risk Assessment
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  risk:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./action
        with:
          ai-key: ${{ secrets.OPENAI_API_KEY }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
