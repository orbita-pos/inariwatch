name: Poll integrations

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger poll
        run: |
          curl -sSfL -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            ${{ secrets.APP_URL }}/api/cron/poll
